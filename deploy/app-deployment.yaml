apiVersion: apps/v1
kind: Deployment
metadata:
  name: ia-marketplace-app
  labels:
    app: ia-marketplace-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ia-marketplace-app
  template:
    metadata:
      labels:
        app: ia-marketplace-app
    spec:
      containers:
        - name: app
          image: ia-marketplace-app:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ia-marketplace-app
spec:
  selector:
    app: ia-marketplace-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
