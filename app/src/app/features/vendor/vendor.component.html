<section class="vendor-shell">
  <ia-card>
    <h2 card-title>Suscripción de vendedor</h2>
    <ia-input>
      <span label>ID de Vendedor</span>
      <input [(ngModel)]="vendorId" />
    </ia-input>

    <ia-input>
      <span label>Plan</span>
      <input [(ngModel)]="plan" />
    </ia-input>

    <ia-button (click)="subscribe()">Registrar suscripción</ia-button>
    <p>{{ status() }}</p>
  </ia-card>
</section>
