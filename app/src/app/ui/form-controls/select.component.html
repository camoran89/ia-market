<mat-form-field appearance="fill" class="full-width">
  <mat-label>{{ label() }}</mat-label>
  <mat-select [(value)]="value()">
    @for (option of options(); track option) {
      <mat-option [value]="option.value">
        {{ option.label }}
      </mat-option>
    }
  </mat-select>
</mat-form-field>
